<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Post - TravelLens</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div th:replace="~{fragments/navbar :: navbar(activePage='', isTransparent=false)}"></div>

    <div class="form-page">
        <div class="form-card">
            <h2>Edit Post</h2>
            <p class="form-subtitle">Update your hidden place or food spot</p>

            <div th:if="${error}" class="alert alert-error"><i class="bi bi-exclamation-circle"></i> <span th:text="${error}"></span></div>

            <form action="#" th:action="@{'/posts/' + ${post.id} + '/edit'}" method="post" enctype="multipart/form-data" class="app-form">
                <div class="form-group">
                    <label for="title">Title *</label>
                    <input type="text" id="title" name="title" th:value="${post.title}" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="location">Location *</label>
                        <input type="text" id="location" name="location" th:value="${post.location}" placeholder="e.g. Paris, France" required>
                    </div>
                    <div class="form-group">
                        <label for="category">Category *</label>
                        <input type="text" id="category" name="category" th:value="${post.category}" placeholder="e.g. Food, Nature" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="description">Description *</label>
                    <textarea id="description" name="description" rows="5" required th:text="${post.description}"></textarea>
                </div>

                <div class="form-group">
                    <label>Current Image</label>
                    <div class="current-image">
                        <img th:src="${post.imageUrl != null} ? ${post.imageUrl} : (${post.imageName != null and !#strings.isEmpty(post.imageName)} ? @{'/images/' + ${post.imageName}} : @{'/images/default-post.jpg'})"
                             onerror="this.src='/images/default-post.jpg'" alt="Current image" class="preview-img">
                    </div>
                </div>

                <div class="form-group">
                    <label for="image">Replace Image (optional)</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="image" name="image"
                               accept="image/*"
                               onchange="previewImage(this)">
                        <span class="file-input-label" id="fileLabel">No file selected</span>
                    </div>
                    <div class="image-preview" id="imagePreview"></div>
                    <small style="display:block;color:var(--gray-400);font-size:0.82rem;margin-top:4px">Supported: JPG, PNG, WEBP. Max 5 MB. Leave empty to keep current image.</small>
                </div>

                <button type="submit" class="btn-auth"><i class="bi bi-check-lg"></i> Update Post</button>
            </form>
            <script>
            function previewImage(input) {
                var label = document.getElementById('fileLabel');
                var preview = document.getElementById('imagePreview');
                preview.innerHTML = '';
                if (input.files && input.files[0]) {
                    label.textContent = input.files[0].name;
                    var reader = new FileReader();
                    reader.onload = function(e) {
                        var img = document.createElement('img');
                        img.src = e.target.result;
                        img.className = 'preview-img';
                        preview.appendChild(img);
                    };
                    reader.readAsDataURL(input.files[0]);
                } else {
                    label.textContent = 'No file selected';
                }
            }
            </script>

            <p class="form-switch"><a th:href="@{'/posts/' + ${post.id}}">Cancel</a></p>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
