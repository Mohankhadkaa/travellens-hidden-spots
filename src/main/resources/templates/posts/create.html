<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post - TravelLens</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div th:replace="~{fragments/navbar :: navbar(activePage='', isTransparent=false)}"></div>

    <div class="form-page">
        <div class="form-card">
            <h2>Create a New Post</h2>
            <p class="form-subtitle">Share a hidden place or food spot with the community</p>

            <div th:if="${error}" class="alert alert-error"><i class="bi bi-exclamation-circle"></i> <span th:text="${error}"></span></div>

            <form action="#" th:action="@{/posts}" method="post" enctype="multipart/form-data" class="app-form">
                <div class="form-group">
                    <label for="title">Title *</label>
                    <input type="text" id="title" name="title" placeholder="Enter a title for your post" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="location">Location *</label>
                        <input type="text" id="location" name="location" placeholder="e.g. Paris, France" required>
                    </div>
                    <div class="form-group">
                        <label for="category">Category *</label>
                        <input type="text" id="category" name="category" placeholder="e.g. Food, Nature" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="description">Description *</label>
                    <textarea id="description" name="description" rows="5" placeholder="Describe this hidden spot and why others should visit..." required></textarea>
                </div>
                <div class="form-group">
                    <label for="image">Image (optional)</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="image" name="image"
                               accept="image/*"
                               onchange="previewImage(this)">
                        <span class="file-input-label" id="fileLabel">No file selected</span>
                    </div>
                    <div class="image-preview" id="imagePreview"></div>
                    <small style="display:block;color:var(--gray-400);font-size:0.82rem;margin-top:4px">Supported: JPG, PNG, WEBP. Max 5 MB. Leave empty for default image.</small>
                </div>
                <button type="submit" class="btn-auth"><i class="bi bi-plus-circle"></i> Create Post</button>
            </form>
            <script>
            function previewImage(input) {
                var label = document.getElementById('fileLabel');
                var preview = document.getElementById('imagePreview');
                preview.innerHTML = '';
                if (input.files && input.files[0]) {
                    label.textContent = input.files[0].name;
                    var reader = new FileReader();
                    reader.onload = function(e) {
                        var img = document.createElement('img');
                        img.src = e.target.result;
                        img.className = 'preview-img';
                        preview.appendChild(img);
                    };
                    reader.readAsDataURL(input.files[0]);
                } else {
                    label.textContent = 'No file selected';
                }
            }
            </script>

            <p class="form-switch"><a href="/posts">Back to posts</a></p>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
