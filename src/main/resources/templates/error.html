<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Error ' + ${status} + ' - TravelLens'">Error - TravelLens</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg, #f8fafc); }
        .error-card { text-align: center; padding: 3rem; }
        .error-card .code { font-size: 5rem; font-weight: 800; color: var(--primary, #0f172a); line-height: 1; }
        .error-card h2 { margin-top: 0.5rem; }
        .error-card p { color: var(--gray-400, #94a3b8); margin: 1rem 0 2rem; }
        .error-buttons { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="code" th:text="${status}">500</div>
        <h2 th:if="${status == 404}">Page Not Found</h2>
        <h2 th:if="${status == 400}">Bad Request</h2>
        <h2 th:if="${status == 403}">Access Denied</h2>
        <h2 th:if="${status == 500 or status == null}">Something Went Wrong</h2>
        <p th:text="${message}">An unexpected error occurred.</p>
        <div class="error-buttons">
            <a href="/" class="btn btn-primary">Go Home</a>
            <a href="javascript:history.back()" class="btn btn-secondary">Go Back</a>
        </div>
    </div>
</body>
</html>
