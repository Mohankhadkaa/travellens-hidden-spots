<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - TravelLens</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div th:replace="~{fragments/navbar :: navbar(activePage='', isTransparent=false)}"></div>

    <div class="auth-page">
        <div class="auth-sidebar">
            <div class="auth-sidebar-bg" style="background-image: url('/images/hero.jpg')"></div>
            <div class="auth-sidebar-overlay"></div>
            <div class="auth-sidebar-content">
                <div class="auth-quote-icon"><i class="bi bi-quote"></i></div>
                <h2>Join the Adventure</h2>
                <p>Create an account and start sharing the hidden places that make your travels unforgettable.</p>
            </div>
        </div>
        <div class="auth-main">
            <div class="auth-card">
                <div class="auth-logo-wrap">
                    <img src="/images/logo.png" alt="TravelLens" onerror="this.style.display='none'">
                    <h1>TravelLens</h1>
                </div>
                <h2>Create an Account</h2>
                <p class="auth-subtitle">Join the TravelLens community</p>

                <div th:if="${error}" class="alert alert-error">
                    <i class="bi bi-exclamation-circle"></i> <span th:text="${error}"></span>
                </div>

                <form action="#" th:action="@{/signup}" method="post" class="auth-form">
                    <div class="form-group">
                        <div class="input-group">
                            <span class="input-icon"><i class="bi bi-person"></i></span>
                            <input type="text" id="username" name="username" placeholder="Choose a username" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <div class="input-group">
                            <span class="input-icon"><i class="bi bi-envelope"></i></span>
                            <input type="email" id="email" name="email" placeholder="Enter your email" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <div class="input-group">
                            <span class="input-icon"><i class="bi bi-lock"></i></span>
                            <input type="password" id="password" name="password" placeholder="At least 6 characters" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <div class="input-group">
                            <span class="input-icon"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat your password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-auth">Sign Up</button>
                </form>

                <p class="auth-switch">Already have an account? <a href="/login">Log in</a></p>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
