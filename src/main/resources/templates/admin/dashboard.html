<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - TravelLens</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div th:replace="~{fragments/navbar :: navbar(activePage='admin', isTransparent=false)}"></div>

    <section class="page-header">
        <div class="container">
            <h1>Admin Dashboard</h1>
            <p>Manage users and posts</p>
        </div>
    </section>

    <div th:if="${success}" class="container" style="margin-top:24px">
        <div class="alert alert-success"><i class="bi bi-check-circle"></i> <span th:text="${success}"></span></div>
    </div>
    <div th:if="${error}" class="container" style="margin-top:24px">
        <div class="alert alert-error"><i class="bi bi-exclamation-circle"></i> <span th:text="${error}"></span></div>
    </div>

    <section class="section">
        <div class="container">
            <div class="admin-stats-grid">
                <div class="admin-stat-card">
                    <div class="admin-stat-icon"><i class="bi bi-people-fill"></i></div>
                    <div class="admin-stat-number" th:text="${totalUsers}">0</div>
                    <div class="admin-stat-label">Total Users</div>
                    <a href="/admin/users" class="btn btn-dark btn-sm" style="margin-top:12px">Manage Users</a>
                </div>
                <div class="admin-stat-card">
                    <div class="admin-stat-icon"><i class="bi bi-person-check-fill"></i></div>
                    <div class="admin-stat-number" th:text="${totalUserAccounts}">0</div>
                    <div class="admin-stat-label">User Accounts</div>
                </div>
                <div class="admin-stat-card">
                    <div class="admin-stat-icon"><i class="bi bi-shield-fill-check"></i></div>
                    <div class="admin-stat-number" th:text="${totalAdminAccounts}">0</div>
                    <div class="admin-stat-label">Admin Accounts</div>
                </div>
                <div class="admin-stat-card">
                    <div class="admin-stat-icon"><i class="bi bi-file-earmark-text-fill"></i></div>
                    <div class="admin-stat-number" th:text="${totalPosts}">0</div>
                    <div class="admin-stat-label">Total Posts</div>
                    <a href="/admin/posts" class="btn btn-dark btn-sm" style="margin-top:12px">Manage Posts</a>
                </div>
            </div>
        </div>
    </section>

    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
