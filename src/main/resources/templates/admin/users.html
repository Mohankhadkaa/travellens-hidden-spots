<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - TravelLens Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div th:replace="~{fragments/navbar :: navbar(activePage='admin', isTransparent=false)}"></div>

    <section class="page-header">
        <div class="container">
            <h1>Manage Users</h1>
            <p>View and manage registered users</p>
        </div>
    </section>

    <div th:if="${success}" class="container" style="margin-top:24px">
        <div class="alert alert-success"><i class="bi bi-check-circle"></i> <span th:text="${success}"></span></div>
    </div>
    <div th:if="${error}" class="container" style="margin-top:24px">
        <div class="alert alert-error"><i class="bi bi-exclamation-circle"></i> <span th:text="${error}"></span></div>
    </div>

    <section class="section">
        <div class="container">
            <div class="admin-table-wrapper">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="u : ${users}">
                            <td th:text="${u.id}">1</td>
                            <td th:text="${u.username}">username</td>
                            <td th:text="${u.email}">email@example.com</td>
                            <td>
                                <span class="admin-role-badge" th:classappend="${u.role == 'ADMIN'} ? 'admin-role-admin' : 'admin-role-user'" th:text="${u.role}">USER</span>
                            </td>
                            <td>
                                <form th:if="${u.email != currentEmail}" th:action="@{'/admin/users/' + ${u.id} + '/delete'}" method="post" style="display:inline" onsubmit="return confirm('Delete this user and all their posts permanently?')">
                                    <button type="submit" class="btn-delete btn-sm" style="padding:6px 14px;font-size:0.82rem"><i class="bi bi-trash"></i> Delete</button>
                                </form>
                                <span th:if="${u.email == currentEmail}" style="color:var(--gray-400);font-size:0.85rem">Current user</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <p style="margin-top:16px"><a href="/admin" class="btn btn-dark"><i class="bi bi-arrow-left"></i> Back to Dashboard</a></p>
        </div>
    </section>

    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
