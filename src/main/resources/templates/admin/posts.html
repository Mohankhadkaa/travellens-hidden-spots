<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Posts - TravelLens Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div th:replace="~{fragments/navbar :: navbar(activePage='admin', isTransparent=false)}"></div>

    <section class="page-header">
        <div class="container">
            <h1>Manage Posts</h1>
            <p>View and manage all posts</p>
        </div>
    </section>

    <div th:if="${success}" class="container" style="margin-top:24px">
        <div class="alert alert-success"><i class="bi bi-check-circle"></i> <span th:text="${success}"></span></div>
    </div>
    <div th:if="${error}" class="container" style="margin-top:24px">
        <div class="alert alert-error"><i class="bi bi-exclamation-circle"></i> <span th:text="${error}"></span></div>
    </div>

    <section class="section">
        <div class="container">
            <div th:if="${#lists.isEmpty(posts)}" class="empty-state">
                <div class="empty-state-icon"><i class="bi bi-file-earmark-text"></i></div>
                <p>No posts yet.</p>
            </div>

            <div class="admin-table-wrapper" th:if="${not #lists.isEmpty(posts)}">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Image</th>
                            <th>Title</th>
                            <th>Author</th>
                            <th>Category</th>
                            <th>Location</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="post : ${posts}">
                            <td th:text="${post.id}">1</td>
                            <td>
                                <img th:src="${post.displayImageUrl}"
                                     onerror="this.src='/images/default-post.jpg'" alt="Post image" class="admin-thumb">
                            </td>
                            <td th:text="${post.title}">Title</td>
                            <td th:text="${post.user.username}">Author</td>
                            <td><span class="admin-role-badge admin-role-user" th:text="${post.category}">Category</span></td>
                            <td th:text="${post.location}">Location</td>
                            <td style="white-space:nowrap">
                                <a th:href="@{'/posts/' + ${post.id}}" class="btn btn-dark btn-sm" style="padding:4px 10px;font-size:0.78rem"><i class="bi bi-eye"></i></a>
                                <a th:href="@{'/posts/' + ${post.id} + '/edit'}" class="btn btn-dark btn-sm" style="padding:4px 10px;font-size:0.78rem"><i class="bi bi-pencil"></i></a>
                                <form th:action="@{'/admin/posts/' + ${post.id} + '/delete'}" method="post" style="display:inline" onsubmit="return confirm('Delete this post permanently?')">
                                    <button type="submit" class="btn-delete btn-sm" style="padding:4px 10px;font-size:0.78rem"><i class="bi bi-trash"></i></button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <p style="margin-top:16px"><a href="/admin" class="btn btn-dark"><i class="bi bi-arrow-left"></i> Back to Dashboard</a></p>
        </div>
    </section>

    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
